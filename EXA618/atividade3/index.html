<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>EXA618 - SAX vs DOM (OSM)</title>

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- PapaParse -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            height: 100vh;
        }

        #sidebar {
            width: 350px;
            padding: 15px;
            background: #1e1e1e;
            color: white;
            overflow-y: auto;
        }

        #map {
            flex: 1;
        }

        #tableContainer {
            flex: 1;
            display: none;
            overflow: auto;
            background: white;
            padding: 10px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 6px;
            text-align: left;
        }

        th {
            background: #eee;
        }

        h2 {
            margin-top: 0;
        }

        .card {
            background: #2a2a2a;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background: #4CAF50;
            color: white;
        }

        input {
            width: 100%;
            padding: 5px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div id="sidebar">
        <h2>📊 SAX vs DOM</h2>

        <input type="text" id="search" placeholder="Buscar por nome..." onkeyup="filterTable()">
        <hr>

        <div class="card">
            <b>SAX</b><br>
            Tempo: 0.93s<br>
            Registros: 125
            <button onclick="loadCSV('/atividade3/sax_output.csv', 'blue')">Mapa SAX</button>
            <button onclick="showTable('/atividade3/sax_output.csv')">Tabela SAX</button>
        </div>

        <div class="card">
            <b>DOM</b><br>
            Tempo: 3.70s<br>
            Registros: 125
            <button onclick="loadCSV('/atividade3/dom_output.csv', 'red')">Mapa DOM</button>
            <button onclick="showTable('/atividade3/dom_output.csv')">Tabela DOM</button>
        </div>
                <hr>

        <button onclick="showMap()">🗺️ Voltar pro mapa</button>
    </div>

    <div id="map"></div>
    <div id="tableContainer"></div>
    

    <script>
        const map = L.map('map').setView([37.43, -122.16], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        let markers = [];
        let currentTableData = [];

        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        function loadCSV(file, color) {
            document.getElementById("map").style.display = "block";
            document.getElementById("tableContainer").style.display = "none";

            clearMarkers();

            Papa.parse(file, {
                download: true,
                header: true,
                complete: function (results) {
                    results.data.forEach(row => {
                        if (!row.lat || !row.lon) return;

                        const marker = L.circleMarker(
                            [parseFloat(row.lat), parseFloat(row.lon)],
                            { radius: 5, color: color }
                        ).addTo(map);

                        marker.bindPopup(`<b>${row.name}</b><br>${row.amenity}`);
                        markers.push(marker);
                    });
                }
            });
        }

        function showTable(file) {
            document.getElementById("map").style.display = "none";
            document.getElementById("tableContainer").style.display = "block";

            Papa.parse(file, {
                download: true,
                header: true,
                complete: function (results) {
                    currentTableData = results.data.filter(r => r.name);

                    renderTable(currentTableData);
                }
            });
        }

        function renderTable(data) {
            let html = "<table><tr><th>Name</th><th>Amenity</th><th>Lat</th><th>Lon</th></tr>";

            data.slice(0, 200).forEach(row => {
                html += `<tr>
        <td>${row.name}</td>
        <td>${row.amenity}</td>
        <td>${row.lat}</td>
        <td>${row.lon}</td>
      </tr>`;
            });

            html += "</table>";

            document.getElementById("tableContainer").innerHTML = html;
        }

        function filterTable() {
            const query = document.getElementById("search").value.toLowerCase();

            const filtered = currentTableData.filter(row =>
                row.name.toLowerCase().includes(query)
            );

            renderTable(filtered);
        }

        function showMap() {
            document.getElementById("map").style.display = "block";
            document.getElementById("tableContainer").style.display = "none";
        }
    </script>

</body>

</html>
